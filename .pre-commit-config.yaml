repos:
  - repo: local
    hooks:
      - id: jupytext
        name: jupytext
        entry: python scripts/run_precommit_tool.py jupytext
        language: system
        types: [jupyter]
        args:
          - --from=ipynb
          - --to=py:light
          - --set-formats=ipynb,py:light
          - --quiet
          - --sync
          - --warn-only

      - id: docformatter
        name: docformatter
        entry: python scripts/run_precommit_tool.py docformatter
        language: system
        types: [python]
        args:
          - --in-place
          - --wrap-descriptions=120
          - --style=google

      - id: black
        name: black
        entry: python scripts/run_precommit_tool.py black
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: python scripts/run_precommit_tool.py isort
        language: system
        types: [python]
        args:
          - --profile=black
          - --float-to-top

      - id: pyupgrade
        name: pyupgrade
        entry: python scripts/run_precommit_tool.py pyupgrade
        language: system
        types: [python]
        args:
          - --py39-plus

      - id: nbqa-black
        name: nbqa-black
        entry: python scripts/run_precommit_tool.py nbqa black
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown

      - id: nbqa-isort
        name: nbqa-isort
        entry: python scripts/run_precommit_tool.py nbqa isort
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown

      - id: nbqa-pyupgrade
        name: nbqa-pyupgrade
        entry: python scripts/run_precommit_tool.py nbqa pyupgrade
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown

      - id: nbqa-flake8
        name: nbqa-flake8
        entry: python scripts/run_precommit_tool.py nbqa flake8
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown
        args:
          - --jobs=1
          - --ignore=E501,E712,W291,F632,E203,F821,F403,W391,F401

      - id: nbqa-pylint
        name: nbqa-pylint
        entry: python scripts/run_precommit_tool.py nbqa pylint
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown
        args:
          - --max-line-length=120
          - --disable=E0401,W0104,R0903,R1721,E1101,E0611,F0002,C0301,C0305,C0303,E2515

      - id: nbqa-pydocstyle
        name: nbqa-pydocstyle
        entry: python scripts/run_precommit_tool.py nbqa pydocstyle
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown

      - id: nbqa-mypy
        name: nbqa-mypy
        entry: python scripts/run_precommit_tool.py nbqa mypy
        language: system
        require_serial: true
        types_or:
          - jupyter
          - markdown
        args:
          - --ignore-missing-imports
          - --strict

      - id: codespell
        name: codespell
        entry: python scripts/run_precommit_tool.py codespell_lib
        language: system
        args:
          - --ignore-regex=^\s*"image\/(jpeg|png|gif|bmp|tiff)":\s.*
          - --ignore-regex=[A-Za-z0-9+/]{100,}
          - --skip=*.js,*.html,*.css,*.svg,*.json,*.png,*.jpg,*.yml,*.yaml

      - id: flake8
        name: flake8
        entry: python scripts/run_precommit_tool.py flake8
        language: system
        types: [python]
        args:
          - --jobs=1
          - --ignore=E501,E712,W291,F632,E203,F821,F403,W391,F401

      - id: pylint
        name: pylint
        entry: python scripts/run_precommit_tool.py pylint
        language: system
        types: [python]
        args:
          - --max-line-length=120
          - --disable=E0401,W0104,R0903,R1721,E1101,F0002,C0301,C0305,C0303,E2515

      - id: mypy
        name: mypy
        entry: python scripts/run_precommit_tool.py mypy
        language: system
        types: [python]
        args:
          - --ignore-missing-imports
          - --strict
